<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Bouggy</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0e0e0e;
  color: white;
}

.logo {
  display: block;
  margin: 30px auto;
  max-width: 250px;
}

h1 {
  text-align: center;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: #1c1c1c;
  padding: 25px;
  border-radius: 12px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
}

input[type="number"] {
  width: 70px;
  text-align: center;
}

/* ✅ NOVÁ POLE */
.input-box {
  margin-top: 15px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
}

#celkem, #pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #00d4ff;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 30px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<img src="logo-bouggy.png" class="logo">
<h1>Sportovní oblečení</h1>

<div class="container">

<div id="items"></div>

<div id="celkem">Celková cena: 0 Kč</div>
<div id="pocet">Počet kusů: 0</div>

<!-- ✅ NOVÁ POVINNÁ POLE -->
<div class="input-box">
  <label>Dřevojánková Ema (Příjmení Jméno):</label>
  <input type="text" id="jmeno" placeholder="Novák Jan">
</div>

<div class="input-box">
  <label>TELEFON:</label>
  <input type="text" id="telefon" placeholder="+420 734 863 094">
</div>

<button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>
let items = [];

async function loadCSV() {
  const res = await fetch("data-Bouggy.csv?t=" + new Date().getTime());
  const text = await res.text();
  parseCSV(text);
  renderItems();
}

function parseCSV(text) {
  const lines = text.split("\n");
  items = [];

  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(";");
    if (parts.length >= 2) {
      items.push({
        nazev: parts[0],
        cena: parseFloat(parts[1]),
        mnozstvi: 0
      });
    }
  }
}

function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, i) => {
    container.innerHTML += `
      <div class="item">
        <span>${item.nazev} (${item.cena} Kč)</span>
        <input type="number" min="0" value="0"
          onchange="updateItem(${i}, this.value)">
      </div>`;
  });
}

function updateItem(i, val) {
  items[i].mnozstvi = parseInt(val) || 0;
  updateSummary();
}

function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(i => {
    celkem += i.cena * i.mnozstvi;
    pocet += i.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

/* ✅ MAILTO LOGIKA */
function odeslatObjednavku() {

  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  if (!jmeno || !telefon) {
    alert("Vyplň jméno a telefon!");
    return;
  }

  const vybrane = items.filter(i => i.mnozstvi > 0);

  if (vybrane.length === 0) {
    alert("Nevybral jsi žádné položky!");
    return;
  }

  let text = "OBJEDNÁVKA\n\n";
  let celkem = 0;
  let pocet = 0;

  vybrane.forEach(i => {
    let cena = i.cena * i.mnozstvi;
    text += `${i.nazev}: ${i.mnozstvi} ks = ${cena} Kč\n`;
    celkem += cena;
    pocet += i.mnozstvi;
  });

  text += "\n-----------------\n";
  text += `Počet kusů: ${pocet}\n`;
  text += `Celkem: ${celkem} Kč\n\n`;
  text += `Zákazník: ${jmeno}\nTelefon: ${telefon}`;

  /* ✅ MAILTO – OTEVŘENÍ EMAILU */
  const mail = "machalek.roman@kostka-skola.cz";
  const subject = encodeURIComponent("Objednávka");
  const body = encodeURIComponent(text);

  window.location.href =
    `mailto:${mail}?subject=${subject}&body=${body}`;
}

window.onload = loadCSV;
</script>

</body>
</html>
