<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Bouggy</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f7fb;
}

/* ✅ LOGO */
.logo {
  text-align: center;
  margin-top: 20px;
}

.logo img {
  width: 220px;
  max-width: 80%;
}

/* ✅ NADPIS */
h1 {
  text-align: center;
  background: #2a72d4;
  color: white;
  padding: 20px;
  margin-top: 10px;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
}

.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
  font-size: 18px;
}

input[type="number"] {
  width: 70px;
  text-align: center;
}

#celkem, #pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #2a72d4;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 30px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #e85a28;
}
</style>
</head>

<body>

<!-- ✅ LOGO -->
<div class="logo">
  <img src="logo Bouggy.png" alt="Bouggy logo">
</div>

<h1>Bouggy - sportovní oblečení</h1>

<div class="container">
  <div id="items"></div>
  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>
  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>
</div>

<script>
let items = [];

// ✅ načítání CSV
async function loadCSV() {
 try {
  const response = await fetch("data_bufet.csv?t=" + Date.now());
  if (!response.ok) {
   throw new Error("Soubor nebyl nalezen");
  }
  const text = await response.text();
  parseCSV(text);
  renderItems();
 } catch (err) {
  console.error(err);
  alert("Chyba načítání CSV.");
 }
}

// ✅ parsování CSV
function parseCSV(text) {
 items = [];
 const lines = text.split("\n");

 for (let i = 1; i < lines.length; i++) {
  const line = lines[i].trim();
  if (!line) continue;

  const [nazev, cena] = line.split(";");
