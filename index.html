<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Bouggy</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0e0e0e;
  color: white;
}

/* ✅ LOGO */
.logo {
  display: block;
  margin: 30px auto;
  max-width: 250px;
}

h1 {
  text-align: center;
}

.container {
  width: 90%;
  max-width: 500px;
  margin: 30px auto;
  background: #1c1c1c;
  padding: 25px;
  border-radius: 12px;
}

/* položky */
.item {
  display: flex;
  justify-content: space-between;
  margin: 12px 0;
}

input[type="number"] {
  width: 70px;
  text-align: center;
}

/* ✅ NOVÁ VSTUPNÍ POLE */
.input-box {
  margin-top: 15px;
}

.input-box input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
}

/* součty */
#celkem, #pocet {
  text-align: center;
  font-size: 22px;
  margin-top: 15px;
  font-weight: bold;
  color: #00d4ff;
}

/* tlačítko */
button {
  width: 100%;
  padding: 15px;
  margin-top: 30px;
  font-size: 24px;
  background: #ff6b35;
  color: white;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #e85a28;
}
</style>
</head>

<body>

<img src="logo-bouggy.png" class="logo">
<h1>Sportovní oblečení</h1>

<div class="container">
  <div id="items"></div>

  <div id="celkem">Celková cena: 0 Kč</div>
  <div id="pocet">Počet kusů: 0</div>

  <!-- ✅ NOVÁ POVINNÁ POLE -->
  <!-- ✅ UŽIVATEL MUSÍ VYPLNIT -->
  <div class="input-box">
    <label>VAŠE JMÉNO (Příjmení Jméno):</label>
    <input type="text" id="jmeno" placeholder="Novák Jan">
  </div>

  <div class="input-box">
    <label>TELEFON:</label>
    <input type="text" id="telefon" placeholder="+420 000 000 000">
  </div>

  <!-- ✅ TLAČÍTKO S MAILTO -->
  <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>

</div>

<script>
let items = [];

/* ✅ Načtení CSV */
async function loadCSV() {
  const response = await fetch("data-Bouggy.csv?t=" + new Date().getTime());
  const text = await response.text();
  parseCSV(text);
  renderItems();
}

/* ✅ Parsování CSV */
function parseCSV(text) {
  items = [];
  const lines = text.split("\n");

  for (let i = 1; i < lines.length; i++) {
    const parts = lines[i].split(";");
    if (parts.length >= 2) {
      items.push({
        nazev: parts[0],
        cena: parseFloat(parts[1]),
        mnozstvi: 0
      });
    }
  }
}

/* ✅ Vykreslení */
function renderItems() {
  const container = document.getElementById("items");
  container.innerHTML = "";

  items.forEach((item, index) => {
    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nazev} (${item.cena} Kč)</span>
      <input type="number" min="0" value="0"
        onchange="updateItem(${index}, this.value)">
    `;

    container.appendChild(div);
  });
}

/* ✅ Změna množství */
function updateItem(index, value) {
  items[index].mnozstvi = parseInt(value) || 0;
  updateSummary();
}

/* ✅ Přepočet */
function updateSummary() {
  let celkem = 0;
  let pocet = 0;

  items.forEach(item => {
    celkem += item.cena * item.mnozstvi;
    pocet += item.mnozstvi;
  });

  document.getElementById("celkem").innerText =
    "Celková cena: " + celkem.toFixed(2) + " Kč";

  document.getElementById("pocet").innerText =
    "Počet kusů: " + pocet;
}

/* ✅ HLAVNÍ FUNKCE MAILTO */
function odeslatObjednavku() {

  const jmeno = document.getElementById("jmeno").value.trim();
  const telefon = document.getElementById("telefon").value.trim();

  // ✅ KONTROLA POVINNÝCH POLÍ
  if (!jmeno || !telefon) {
    alert("Vyplň prosím jméno a telefon!");
    return;
  }

  const vybrane = items.filter(i => i.mnozstvi > 0);

  if (vybrane.length === 0) {
    alert("Nevybral jsi žádné položky!");
    return;
  }

  let text = "OBJEDNÁVKA:\n\n";
  let celkem = 0;
  let pocet = 0;

  vybrane.forEach(item => {
    const mezisoucet = item.cena * item.mnozstvi;
    text += `${item.nazev} - ${item.mnozstvi} ks - ${mezisoucet} Kč\n`;
    celkem += mezisoucet;
    pocet += item.mnozstvi;
  });

  text += "\n-----------------------\n";
  text += `Celkem kusů: ${pocet}\n`;
  text += `Celková cena: ${celkem} Kč\n\n`;

  text += `Zákazník:\n${jmeno}\nTelefon: ${telefon}`;

  // ✅ MAILTO (HLAVNÍ ČÁST)
  const email = "machalek.roman@kostka-skola.cz";
  const subject = encodeURIComponent("Nová objednávka");
  const body = encodeURIComponent(text);

  // ✅ OTEVŘENÍ EMAIL KLIENTA
  window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
}

/* ✅ START */
window.addEventListener("load", loadCSV);
</script>

</body>
</html>
