<!DOCTYPE html><!DOCTYPE="cs">
<head>
<meta charset="UTF-8">
<title>Bouggy</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0e0e0e;
    color: white;
}

/* ✅ Logo nahoře */
.logo {
    display: block;
    margin: 20px auto;
    max-width: 300px;
}

/* Nadpis */
h1 {
    text-align: center;
    color: #ffffff;
}

/* Hlavní box */
.container {
    width: 90%;
    max-width: 500px;
    margin: 30px auto;
    background: #1c1c1c;
    padding: 25px;
    border-radius: 12px;
}

/* Položky */
.item {
    display: flex;
    justify-content: space-between;
    margin: 12px 0;
    font-size: 18px;
}

input[type="number"] {
    width: 70px;
    text-align: center;
}

#celkem, #pocet {
    text-align: center;
    font-size: 22px;
    margin-top: 15px;
    font-weight: bold;
    color: #00d4ff;
}

/* Tlačítko */
button {
    width: 100%;
    padding: 15px;
    margin-top: 30px;
    font-size: 24px;
    background: #ff6b35;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

button:hover {
    background: #e85a28;
}
</style>
</head>

<body>

<!-- ✅ LOGO -->
<img src="logo.png" alt="Bouggy logo" class="logo">

<h1>Sportovní oblečení</h1>

<div class="container">
    <div id="items"></div>

    <div id="celkem">Celková cena: 0 Kč</div>
    <div id="pocet">Počet kusů: 0</div>

    <button onclick="odeslatObjednavku()">ODESLAT OBJEDNÁVKU</button>
</div>

<script>

let items = [];

/*
✅ Načtení CSV (bez cache -> vždy nová data po F5)
*/
async function loadCSV() {
    try {
        const response = await fetch("data-Bouggy.csv?t=" + new Date().getTime());

        if (!response.ok) {
            throw new Error("CSV soubor nebyl nalezen");
        }

        const text = await response.text();

        parseCSV(text);
        renderItems();

    } catch (error) {
        console.error(error);
        alert("Chyba načítání CSV souboru");
    }
}

/*
✅ Parsování CSV
*/
function parseCSV(text) {
    items = [];

    const lines = text.split("\n");

    for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();

        if (!line) continue;

        const parts = line.split(";");

        if (parts.length >= 2) {
            const nazev = parts[0].trim();
            const cena = parseFloat(parts[1].replace(",", "."));

            if (!isNaN(cena)) {
                items.push({
                    nazev: nazev,
                    cena: cena,
                    mnozstvi: 0
                });
            }
        }
    }
}

/*
✅ Vykreslení položek
*/
function renderItems() {
    const container = document.getElementById("items");
    container.innerHTML = "";

    items.forEach((item, index) => {
        const div = document.createElement("div");
        div.className = "item";

        div.innerHTML = `
            <span>${item.nazev} (${item.cena} Kč)</span>
            <input type="number" min="0" value="0"
                   onchange="updateItem(${index}, this.value)">
        `;

        container.appendChild(div);
    });
}

/*
✅ Změna množství
*/
function updateItem(index, value) {
    const pocet = parseInt(value) || 0;
    items[index].mnozstvi = pocet;

    updateSummary();
}

/*
✅ Součet
*/
function updateSummary() {
    let celkem = 0;
    let pocet = 0;

    items.forEach(item => {
        celkem += item.cena * item.mnozstvi;
        pocet += item.mnozstvi;
    });

    document.getElementById("celkem").innerText =
        "Celková cena: " + celkem.toFixed(2) + " Kč";

    document.getElementById("pocet").innerText =
        "Počet kusů: " + pocet;
}

/*
✅ Objednávka
*/
function odeslatObjednavku() {
    const objednavka = items
        .filter(item => item.mnozstvi > 0)
        .map(item => `${item.nazev}: ${item.mnozstvi} ks`);

    if (objednavka.length === 0) {
        alert("Nevybral jsi žádné položky!");
        return;
    }

    alert("Objednávka:\n\n" + objednavka.join("\n"));
}

/*
✅ START
*/
window.addEventListener("load", loadCSV);

</script>

</body>
</html>
